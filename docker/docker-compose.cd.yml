# CD: Weblate only; host PostgreSQL + Redis.
# Deploy: docker compose -f docker/docker-compose.cd.yml --env-file .env up -d

services:
  weblate:
    build:
      context: ..
      dockerfile: docker/Dockerfile.weblate-plugin
    env_file:
    - ../.env
    ports:
    - 127.0.0.1:${WEBLATE_PORT:-9103}:8080
    extra_hosts:
    - host.docker.internal:host-gateway
    environment:
      WEBLATE_SITE_DOMAIN: ${WEBLATE_SITE_DOMAIN:-staging.insights.cppalliance.org}
      WEBLATE_ADMIN_PASSWORD: ${WEBLATE_ADMIN_PASSWORD:?set in .env}
      WEBLATE_DEBUG: ${WEBLATE_DEBUG:-0}
      POSTGRES_HOST: host.docker.internal
      POSTGRES_PORT: '5432'
      POSTGRES_USER: ${POSTGRES_USER:-weblate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-weblate}
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      CELERY_SINGLE_PROCESS: ${CELERY_SINGLE_PROCESS:-1}
    healthcheck:
      test: [CMD, curl, -f, http://localhost:8080/healthz/]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '5'
    networks:
    - bdc_redis

networks:
  bdc_redis:
    external: true
    name: boost-data-collector_default
